name: merascope
channels:
  - conda-forge
  - defaults
dependencies:
  # geopandas 0.10.x is the last release supporting Python 3.7;
  # upgrading to geopandas 0.11+ requires Python 3.8+ and a full env rebuild
  - python=3.7
  - geopandas=0.10.2
  - pandas=1.3.5
  - numpy=1.21.6
  - scipy=1.4.1
  - matplotlib=3.1.3
  - pillow=9.5.0
  - requests=2.31.0
  - pytest=7.4.4
  - ipykernel
