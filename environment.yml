name: merascope
# NOTE: conda env create -f environment.yml fails on conda <= 4.8.x due to a bug
# in the conflict resolver (TypeError in match_spec.py). conda >= 4.9.0 fixes it.
# Use setup_env.sh instead, which clones a working environment when available,
# or upgrade conda first: conda update -n base conda
channels:
  - conda-forge
  - defaults
dependencies:
  # geopandas 0.10.x is the last release supporting Python 3.7;
  # upgrading to geopandas 0.11+ requires Python 3.8+ and a full env rebuild
  - python=3.7
  - geopandas=0.10.2
  - pandas=1.3.5
  - numpy=1.21.6
  - scipy=1.4.1
  - matplotlib=3.1.3
  - pillow=9.5.0
  - requests=2.31.0
  - pytest=7.4.4
  - ipykernel
