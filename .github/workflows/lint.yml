name: Lint

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.7"
      - run: pip install flake8
      - run: flake8 scripts/ merascope/ --max-line-length 120 --extend-ignore E501,W503
